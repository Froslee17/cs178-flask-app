<!DOCTYPE html>
<html>
<head>
    <title>Movie Details</title>
</head>
<body>
    <h1>Movie Details</h1>

    <table border="1">
        <tr>
            <th>Title</th>
            <th>Genre</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.title }}</td>
            <td>{{ movie.genre_name }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back Home</a>
</body>
</html>
