<!DOCTYPE html>
<html>
<head>
    <title>Movies</title>
</head>
<body>
    <h1>Movies</h1>

    <table border="1">
        <tr>
            <th>Movie ID</th>
            <th>Title</th>
            <th>Year</th>
        </tr>

        {% for movie in movies %}
        <tr>
            <td>{{ movie.id }}</td>
            <td>{{ movie.title }}</td>
            <td>{{ movie.year }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">Back Home</a>
</body>
</html>
